<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/login.css">
    <title>Gestion de Facturas</title>
</head>
<body>
    <div id="login_container" class="login-container">

      <div class="bienvenida">
        <img id="prim" src="/img/fondo2 arriba.png" alt="">
        <img id="seg" src="/img/fondo2 abajo.png" alt="">
      </div>

      <div id="pantalla-login" class="contenedor">
          <h2>Iniciar Sesión</h2>
          <div id="caja-error" class="error"></div>
  
          <form id="formulario-login">
              <div class="campo">
                  <label>Usuario:</label>
                  <input type="text" id="usuario" required placeholder="Ingresa tu usuario">
              </div>
              <div class="campo">
                  <label>Contraseña:</label>
                  <input type="password" id="clave" required placeholder="Ingresa tu contraseña">
              </div>
              <button type="submit" class="btn">Iniciar Sesión</button>

              <a href="#" id="olvido-clave" class="olvido-clave" style="margin-top: 10px; display: block; text-align: center; color: #007BFF; text-decoration: none;">¿Olvidaste tu contraseña?</a>
          </form>
      </div>
    </div>

    <footer class="footer">
        &copy; 2026 EchoSystems. Todos los derechos reservados.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
