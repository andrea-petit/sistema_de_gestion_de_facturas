<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conectar al Sistema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .contenedor { background: white; padding: 35px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; color: #2c3e50; }
        .campo { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        input:focus { border-color: #3498db; outline: none; }
        .btn { width: 100%; padding: 12px; background: #27ae60; border: none; color: white; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #219150; }
        .error { color: #c0392b; background: #fde8e7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; }
        
        /* Segunda Pantalla: El "Siguiente" paso del sistema */
        #pantalla-sistema { display: none; }
        .caja-exito { background: #d4edda; color: #155724; padding: 20px; border-radius: 6px; text-align: left; margin-top: 15px; border-left: 5px solid #28a745; }
        .token-area { background: #2d3436; color: #dfe6e9; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 11px; word-break: break-all; margin-top: 10px; max-height: 100px; overflow-y: auto; }
        .btn-sistema { display: block; text-decoration: none; text-align: center; background: #2980b9; color: white; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 15px; }
        .btn-sistema:hover { background: #2471a3; }
    </style>
</head>
<body>

    <div id="pantalla-login" class="contenedor">
        <h2>Iniciar Sesión</h2>
        <div id="caja-error" class="error"></div>

        <form id="formulario-login">
            <div class="campo">
                <label>Usuario:</label>
                <input type="text" id="usuario" required placeholder="Tu usuario de la BD">
            </div>
            <div class="campo">
                <label>Contraseña:</label>
                <input type="password" id="clave" required placeholder="Tu contraseña">
            </div>
            <button type="submit" class="btn">Validar con Backend</button>
        </form>
    </div>

    <div id="pantalla-sistema" class="contenedor">
        <h2>🎉 ¡Acceso Concedido!</h2>
        
        <div class="caja-exito">
            <p id="mensaje-bienvenida" style="font-size: 18px; font-weight: bold;"></p>
            <p style="margin-top: 8px; font-size: 14px;">El Backend verificó tus credenciales con Supabase correctamente.</p>
        </div>


        <a href="/dashboard" class="btn-sistema">Entrar al Extractor de Facturas ➡️</a>

        <button class="btn" style="background: #7f8c8d; margin-top: 15px; padding: 8px;" onclick="window.location.reload()">Cerrar Sesión</button>
    </div>

    <script>
        const form = document.getElementById('formulario-login');
        const vistaLogin = document.getElementById('pantalla-login');
        const vistaSistema = document.getElementById('pantalla-sistema');
        const errorDiv = document.getElementById('caja-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';

            const nombre = document.getElementById('usuario').value;
            const contrasena = document.getElementById('clave').value;

            try {
                // Llama a tu endpoint del backend
                const respuesta = await fetch('/api/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, contrasena })
                });

                const datos = await respuesta.json();

                if (datos.ok) {
                    localStorage.setItem('token', datos.token);
                    
                    // PASAR A LA SIGUIENTE PANTALLA: Oculta Login, muestra Éxito
                    vistaLogin.style.display = 'none';
                    vistaSistema.style.display = 'block';

                    document.getElementById('mensaje-bienvenida').innerText = datos.msg;
                    document.getElementById('token-salida').innerText = datos.token;
                } else {
                    errorDiv.innerText = datos.msg;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = 'Error: Asegúrate de correr "node app.js" en la terminal.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
